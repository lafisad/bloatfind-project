name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            suffix: linux-x86_64
          - os: macos-latest
            cc: clang
            suffix: macos-universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: |
          CC=${{ matrix.cc }} CFLAGS="-O3 -Wall -Wextra -Wpedantic -std=c11 -static" make

      - name: Strip binary
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            strip bloatfind
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp bloatfind dist/bloatfind-${{ matrix.suffix }}
          chmod +x dist/bloatfind-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bloatfind-${{ matrix.suffix }}
          path: dist/

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
